name: Mirror to public repo

on:
  push:
    branches: ['**']
  delete:
  create:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - name: Mirror to darivnu/arcade without workflows
        run: |
          git clone --mirror "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" repo-mirror
          cd repo-mirror
          git filter-repo --path .github/workflows/ --invert-paths --force
          git remote add public "https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/darivnu/arcade.git"
          git push public --mirror
