name: Sync PRs to public repo

on:
  pull_request:
    types: [opened, edited, closed, reopened]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const action = context.payload.action;
            const sourceUrl = pr.html_url;

            const body = `> *Mirrored from the organization repo — [view original](${sourceUrl})*\n> **Author:** @${pr.user.login} | **Branch:** \`${pr.head.ref}\` → \`${pr.base.ref}\`\n\n${pr.body || ''}`;

            if (action === 'opened') {
              // PRs need the branch to exist in the public repo (handled by mirror.yml)
              // We create it as an issue to preserve the discussion
              await github.rest.issues.create({
                owner: 'darivnu',
                repo: 'arcade',
                title: `[PR] ${pr.title}`,
                body,
                labels: ['pull-request'],
              });
            }

            if (action === 'edited') {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: 'darivnu',
                repo: 'arcade',
                state: 'all',
              });
              const mirror = issues.find(i => i.body && i.body.includes(sourceUrl));
              if (mirror) {
                await github.rest.issues.update({
                  owner: 'darivnu',
                  repo: 'arcade',
                  issue_number: mirror.number,
                  title: `[PR] ${pr.title}`,
                  body,
                });
              }
            }

            if (action === 'closed') {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: 'darivnu',
                repo: 'arcade',
                state: 'open',
              });
              const mirror = issues.find(i => i.body && i.body.includes(sourceUrl));
              if (mirror) {
                const merged = pr.merged ? ' (merged)' : ' (closed)';
                await github.rest.issues.update({
                  owner: 'darivnu',
                  repo: 'arcade',
                  issue_number: mirror.number,
                  title: `[PR${merged}] ${pr.title}`,
                  state: 'closed',
                });
              }
            }

            if (action === 'reopened') {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: 'darivnu',
                repo: 'arcade',
                state: 'closed',
              });
              const mirror = issues.find(i => i.body && i.body.includes(sourceUrl));
              if (mirror) {
                await github.rest.issues.update({
                  owner: 'darivnu',
                  repo: 'arcade',
                  issue_number: mirror.number,
                  state: 'open',
                });
              }
            }
